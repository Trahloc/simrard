version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      cargo-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

